services:
  db:
    image: postgres:16-alpine
    container_name: inshop_db
    environment:
      POSTGRES_DB: ${DB_NAME:-inshop}
      POSTGRES_USER: ${DB_USER:-inshop}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - backend
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-inshop}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: inshop_backend
    depends_on:
      db:
        condition: service_healthy
    environment:
      SECRET_KEY: ${SECRET_KEY:-django-insecure-dev-only-change-me}
      DEBUG: ${DEBUG:-False}
      DB_NAME: ${DB_NAME:-inshop}
      DB_USER: ${DB_USER:-inshop}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_HOST: db
      DB_PORT: 5432
      ALLOWED_HOSTS: ${ALLOWED_HOSTS:-*}
      ALLOWED_ORIGIN: ${ALLOWED_ORIGIN:-http://localhost:8080}
      EMAIL_BACKEND: ${EMAIL_BACKEND:-django.core.mail.backends.console.EmailBackend}
      EMAIL_HOST: ${EMAIL_HOST:-}
      EMAIL_PORT: ${EMAIL_PORT:-587}
      EMAIL_HOST_USER: ${EMAIL_HOST_USER:-}
      EMAIL_HOST_PASSWORD: ${EMAIL_HOST_PASSWORD:-}
      DEFAULT_FROM_EMAIL: ${DEFAULT_FROM_EMAIL:-noreply@inshop-builder.com}
    volumes:
      - media_data:/app/media
      - static_data:/app/static
    networks:
      - backend
    restart: unless-stopped
    # Run migrations then start server
    command: >
      sh -c "python manage.py migrate --noinput &&
             python manage.py seed_categories &&
             python manage.py collectstatic --noinput &&
             gunicorn core.wsgi:application --bind 0.0.0.0:8000 --workers 4 --timeout 120"

  nginx:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: inshop_nginx
    depends_on:
      - backend
    ports:
      - "8080:80"
    environment:
      ALLOWED_ORIGIN: ${ALLOWED_ORIGIN:-http://localhost:8080}
    volumes:
      - media_data:/usr/share/nginx/media:ro
      - static_data:/usr/share/nginx/static:ro
      - ./backend/custom_admin:/usr/share/nginx/admin:ro
    networks:
      - backend
    restart: unless-stopped

networks:
  backend:
    driver: bridge

volumes:
  postgres_data:
  media_data:
  static_data:
