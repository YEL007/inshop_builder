<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>InShop Builder — Build Your Dream PC</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --black:   #0e0e0e;
      --dark:    #1a1a1a;
      --panel:   #212121;
      --metal:   #3c3c3c;
      --metal2:  #2a2a2a;
      --red:     #e8001d;
      --red-dim: #a80015;
      --red-glow:rgba(232,0,29,0.25);
      --white:   #ffffff;
      --offwhite:#d0d0d0;
      --gray:    #9a9a9a;
      --border-color:  rgba(232,0,29,0.2);
      --border2: rgba(255,255,255,0.06);

      --accent: var(--red);
      --accent-bright: var(--red-dim);
      --bg-base: var(--black);
      --bg-surface: var(--black);
      --border: var(--border-color);
      --text: var(--white);
      --text-muted: var(--gray);
    }
    /* Light mode overrides */
    .light-mode {
      --black:   #f0f0f0;
      --dark:    #ffffff;
      --panel:   #f5f5f5;
      --metal:   #cccccc;
      --metal2:  #e8e8e8;
      --white:   #1a1a1a;
      --offwhite:#2a2a2a;
      --gray:    #555555;
      --border-color: rgba(0,0,0,0.12);
      --border2: rgba(0,0,0,0.08);
      --bg-base: #f0f0f0;
      --bg-surface: #ffffff;
      --text: #1a1a1a;
      --text-muted: #555555;
    }
    .light-mode body { background: #f0f0f0; color: #1a1a1a; }
    .light-mode ::-webkit-scrollbar-track { background: #e0e0e0; }
    .light-mode ::-webkit-scrollbar-thumb { background: #b0b0b0; }

    html { scroll-behavior: smooth; }
    body {
      background: var(--bg-base);
      color: var(--text);
      font-family: 'Space Grotesk', sans-serif;
      -webkit-font-smoothing: antialiased;
      min-height: 100vh;
      cursor: none;
    }
    body::after {
      content:'';
      position:fixed; inset:0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='1'/%3E%3C/svg%3E");
      opacity: 0.025;
      pointer-events: none;
      z-index: 200;
    }
    #root { min-height: 100vh; }
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: #080808; }
    ::-webkit-scrollbar-thumb { background: #2a2a2a; border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: #383838; }
    * { scrollbar-width: thin; scrollbar-color: #2a2a2a #080808; }
    input, select, textarea, button { font-family: 'Space Grotesk', sans-serif; }
    button:hover { opacity: 0.9; }
    a { color: inherit; text-decoration: none; }
    @keyframes float {
      0%, 100% { transform: translateY(0px); }
      50% { transform: translateY(-12px); }
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }
    main > div { animation: fadeIn 0.25s ease; }
    nav button:hover { color: var(--white) !important; background: var(--metal2) !important; }
    input:focus, select:focus, textarea:focus {
      border-color: var(--red) !important;
      outline: none;
    }
    [data-selector-card]:hover {
      border-color: var(--red) !important;
      background: var(--metal2) !important;
    }
    [data-step-card]:not([data-active]):hover {
      border-color: var(--metal) !important;
      background: var(--metal2) !important;
    }
    button:hover[data-action] {
      color: var(--white) !important;
      border-color: var(--metal) !important;
    }
    .cursor {
      position: fixed;
      width: 10px; height: 10px;
      background: var(--red);
      pointer-events: none;
      z-index: 9999;
      transform: translate(-50%, -50%);
      transition: width .15s, height .15s, opacity .15s;
      clip-path: polygon(50% 0%, 100% 50%, 50% 100%, 0% 50%);
    }
    .cursor-cross-h, .cursor-cross-v {
      position: fixed;
      background: rgba(232,0,29,0.4);
      pointer-events: none;
      z-index: 9997;
      transform: translate(-50%, -50%);
      transition: opacity .2s;
    }
    .cursor-cross-h { width: 24px; height: 1px; }
    .cursor-cross-v { width: 1px; height: 24px; }

    /* ── Responsive ──────────────────────────────────────────────── */
    .rsp-nav-mobile-btn { display: none !important; }
    .rsp-builder-bar   { display: none !important; }

    @media (max-width: 900px) {
      /* Nav */
      .rsp-nav-links      { display: none !important; }
      .rsp-nav-mobile-btn { display: flex !important; align-items: center; justify-content: center; }

      /* Spacing */
      .rsp-pad          { padding-left: 20px !important; padding-right: 20px !important; }
      .rsp-page-header  { padding: 28px 20px 20px !important; }
      .rsp-section      { padding: 40px 20px !important; }
      .rsp-cta          { padding: 48px 20px !important; }
      .rsp-cart-pad     { padding: 64px 20px 20px !important; }
      .rsp-user-tabs    { padding: 0 16px !important; overflow-x: auto !important; white-space: nowrap !important; }
      .rsp-user-content { padding: 24px 16px !important; }

      /* Hero */
      .home-hero      { padding: 96px 20px 48px !important; }
      .hero-right     { display: none !important; }
      .rsp-hero-btns  { flex-wrap: wrap !important; gap: 10px !important; }

      /* Grids */
      .home-grid  { grid-template-columns: repeat(2,1fr) !important; }
      .rsp-grid-4 { grid-template-columns: repeat(2,1fr) !important; }
      .rsp-grid-3 { grid-template-columns: repeat(2,1fr) !important; }
      .rsp-grid-2 { grid-template-columns: 1fr !important; }

      /* Catalog */
      .rsp-catalog         { flex-direction: column !important; }
      .rsp-catalog-sidebar { width: 100% !important; min-height: auto !important; border-right: none !important; border-bottom: 1px solid #3c3c3c !important; }

      /* Builder wizard */
      .wizard-body    { grid-template-columns: 1fr !important; }
      .wizard-sidebar { display: none !important; }
      .wizard-grid    { grid-template-columns: repeat(2,1fr) !important; }
      .rsp-builder-bar { display: flex !important; }

      /* Cart / checkout */
      .rsp-cart       { grid-template-columns: 1fr !important; }

      /* Product detail */
      .rsp-pd-layout  { grid-template-columns: 1fr !important; }

      /* Prebuilt grid */
      .rsp-pb-grid    { grid-template-columns: repeat(2,1fr) !important; }

      /* Footer */
      .rsp-footer-top   { flex-direction: column !important; gap: 32px !important; }
      .rsp-footer-links { flex-direction: column !important; gap: 20px !important; }
      .rsp-footer-bottom { flex-direction: column !important; gap: 10px !important; text-align: center !important; }

      /* Compare */
      .rsp-compare-wrap { overflow-x: auto !important; }

      /* Guided configurator */
      .rsp-guided-uc  { grid-template-columns: repeat(2,1fr) !important; }
      .rsp-guided-bud { grid-template-columns: 1fr !important; }
      .rsp-guided-res { grid-template-columns: 1fr !important; }
    }

    @media (max-width: 480px) {
      .home-grid  { grid-template-columns: repeat(2,1fr) !important; }
      .rsp-grid-4 { grid-template-columns: 1fr !important; }
      .rsp-grid-3 { grid-template-columns: 1fr !important; }
      .rsp-pb-grid { grid-template-columns: 1fr !important; }
      .wizard-grid { grid-template-columns: 1fr !important; }
      .rsp-guided-uc { grid-template-columns: 1fr !important; }
    }
  </style>
</head>
<body>
  <div class="cursor" id="cursor"></div>
  <div class="cursor-cross-h" id="crossH"></div>
  <div class="cursor-cross-v" id="crossV"></div>
  <div id="root"></div>

  <script type="module" src="/src/main.jsx"></script>

  <script>
    const cursor = document.getElementById('cursor');
    const crossH = document.getElementById('crossH');
    const crossV = document.getElementById('crossV');

    document.addEventListener('mousemove', e => {
      const x = e.clientX, y = e.clientY;
      cursor.style.left = x + 'px';
      cursor.style.top  = y + 'px';
      crossH.style.left = x + 'px';
      crossH.style.top  = y + 'px';
      crossV.style.left = x + 'px';
      crossV.style.top  = y + 'px';
    });

    document.addEventListener('mouseover', e => {
      const target = e.target.closest('button, a, [role="button"], input, select');
      if(target){
        cursor.style.width = '16px';
        cursor.style.height = '16px';
        crossH.style.width = '36px';
        crossV.style.height = '36px';
      }
    });

    document.addEventListener('mouseout', e => {
      const target = e.target.closest('button, a, [role="button"], input, select');
      if(target){
        cursor.style.width = '10px';
        cursor.style.height = '10px';
        crossH.style.width = '24px';
        crossV.style.height = '24px';
      }
    });
  </script>
</body>
</html>
