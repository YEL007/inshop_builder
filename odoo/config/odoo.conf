[options]
addons_path = /mnt/extra-addons,/usr/lib/python3/dist-packages/odoo/addons
data_dir = /var/lib/odoo

db_host = db
db_port = 5432
db_name = odoo
db_user = odoo
# db_password is read from the PASSWORD env var set in docker-compose (no need to repeat it here)

# Admin master password — MUST be changed before going live
# Set ODOO_ADMIN_PASSWD in your .env and update this value accordingly
admin_passwd = CHANGE_THIS_IN_PRODUCTION

# Logging
log_level = info
log_handler = [':INFO']

# Workers (0 = single-threaded, good for dev; set to cpu_count for prod)
workers = 2
max_cron_threads = 1

# Security — accept requests from Nginx only
proxy_mode = True

# Performance
limit_memory_hard = 2684354560
limit_memory_soft = 2147483648
limit_request = 8192
limit_time_cpu = 600
limit_time_real = 1200
