[options]
addons_path = /mnt/extra-addons,/usr/lib/python3/dist-packages/odoo/addons
data_dir = /var/lib/odoo

db_host = db
db_port = 5432
db_name = odoo
db_user = odoo
db_password = odoo_secret

# Admin master password — change this in production!
admin_passwd = admin_master_secret

# Logging
log_level = info
log_handler = [':INFO']

# Workers (0 = single-threaded, good for dev; set to cpu_count for prod)
workers = 2
max_cron_threads = 1

# Security — accept requests from Nginx only
proxy_mode = True

# Performance
limit_memory_hard = 2684354560
limit_memory_soft = 2147483648
limit_request = 8192
limit_time_cpu = 600
limit_time_real = 1200
